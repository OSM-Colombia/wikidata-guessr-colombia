<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Wikidata Guessr - Colombia</title>
        <link rel='stylesheet' href='css/bootstrap.css' />
        <link rel='stylesheet' href='css/style.css' />
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.0.3/dist/leaflet.css" integrity="sha512-07I2e+7D8p6he1SIM+1twR5TIrhUQn9+I6yjqD53JQjFiMf8EtC93ty0/5vJTZGF8aAocvHYNEDJajGdNx1IsQ==" crossorigin=""/>
        <script type='text/javascript' src='https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js'></script>
        <script src="https://unpkg.com/leaflet@1.0.3/dist/leaflet.js" integrity="sha512-A7vV8IFfih/D732iSSKi20u/ooOfj/AGehOKq0f4vLT1Zr2Y+RX7C+w8A1gaSasGtRUZpF/NZgzSAu4/Gc41Lg==" crossorigin=""></script>
        <script type='text/javascript' src='js/rnd.js'></script>
        <script type='text/javascript' src='js/minimap.js'></script>
        <script type='text/javascript' src='js/roundmap.js'></script>
        <script type='text/javascript' src='js/app.js'></script>
    </head>
    <body>
        <div id='content'>
            <div id="roundEnd"></div>
            <div id="endGame"></div>
            <div id='scoreBoard'>
                <span class='round'>Ronda actual: <b>1/5</b></span><br/>
                <span class='roundScore'>Puntos última ronda: <b>0</b></span><br/>
                <span class='totalScore'>Puntuación total: <b>0</b></span><br />
                <span><a href="https://github.com/OSM-Colombia/wikidata-guessr-colombia">Ver proyecto en GitHub</a></span>
                <span>
                    <select id="mode">
                        <option value="">Todos (145)</option>
                        <option value="?Q33506">Monumentos (100)</option>
                        <option value="?Q839954">Sitios históricos (14)</option>
                        <option value="?Q46169">Parques nacionales (31)</option>
                    </select>
                </span>
            </div>
            <div id='miniMap'></div>
            <div id='guessButton' class="btn btn-large btn-danger">Adivinar ubicación</div>
            <img id='image' src='' />
            <div id='helpBox'>
                La imagen es la foto principal (P18) del ítem en Wikidata.
                <a href="https://github.com/OSM-Colombia/wikidata-guessr-colombia#c%C3%B3mo-aparecer-en-el-juego-wikidata--commons" target="_blank" rel="noopener">Más info</a>
            </div>
            <div id='footerLinks'>
                <a href="https://osm.lat/Colombia" target="_blank" rel="noopener">osm.lat/Colombia</a>
                <a href="https://ac3.org.co" target="_blank" rel="noopener">ac3.org.co</a>
            </div>
        </div>
    </body>
</html>
